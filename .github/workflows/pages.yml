name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate entry files
        run: |
          test -f index.html
          test -f assets/js/mesh.js
          test -f assets/data/knowledge-mesh.json
          test -f CNAME
          grep -q 'three@0.170.0' index.html
          grep -q 'assets/js/mesh.js' index.html
          ! grep -q 'ui.min.js' index.html

      - name: Validate knowledge mesh JSON
        run: |
          python3 <<'PY'
          import json

          with open("assets/data/knowledge-mesh.json", encoding="utf-8") as f:
              data = json.load(f)

          nodes = data.get("nodes", [])
          edges = data.get("edges", [])
          ids = {n["id"] for n in nodes}

          assert nodes, "nodes must not be empty"
          assert len(ids) == len(nodes), "duplicate node ids"
          for edge in edges:
              assert edge["source"] in ids, f"missing source: {edge['source']}"
              assert edge["target"] in ids, f"missing target: {edge['target']}"

          print(f"ok: {len(nodes)} nodes, {len(edges)} edges")
          PY

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
